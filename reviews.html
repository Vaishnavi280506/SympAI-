<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediConnect — Doctor Reviews</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="profile.css">
</head>
<body>

  <nav class="navbar">
    <a href="doctor.html" class="navbar-logo">
      <div class="logo-icon"><i class="fa-solid fa-heart-pulse"></i></div>
      <span>Symp<em>AI</em></span>
    </a>
    <a href="doctor.html" class="navbar-back-btn">
      <i class="fa-solid fa-arrow-left"></i> Back to Doctors
    </a>
  </nav>

  <div class="page-wrapper" id="dynamicProfile">

    <div class="breadcrumb">
      <a href="doctor.html">Home</a>
      <i class="fa-solid fa-chevron-right"></i>
      <a href="#" class="dynamic-tab">Doctor Profile</a>
      <i class="fa-solid fa-chevron-right"></i>
      <span>Reviews</span>
    </div>

    <div class="profile-card">
      <div class="doctor-header">
        <img src="" alt="Doctor Avatar" class="doc-img">
        <div class="doctor-info">
          <h2>Dr. <span class="doc-name">Doctor Name</span></h2>
          <p><i class="fa-solid fa-heart-pulse" style="color:#245f37;"></i> <span class="doc-specialty">Specialty</span></p>
          <p><i class="fa-solid fa-location-dot" style="color:#245f37;"></i> <span class="doc-location">Location</span></p>
          <p><i class="fa-solid fa-clock" style="color:#245f37;"></i> Next available: <span class="doc-avail">2:30 PM Today</span></p>
          <div class="doctor-stats">
            <div class="doc-stat"><div class="ds-num doc-exp">15+</div><div class="ds-label">Years Exp.</div></div>
            <div class="doc-stat"><div class="ds-num doc-rating">4.9★</div><div class="ds-label">Rating</div></div>
            <div class="doc-stat"><div class="ds-num doc-patients">2K+</div><div class="ds-label">Patients</div></div>
            <div class="doc-stat"><div class="ds-num doc-response">98%</div><div class="ds-label">Response</div></div>
          </div>
          <div class="tags doc-tags"><span>English</span></div>
          <div class="action-buttons">
            <button onclick="location.href='book-consultation.html'"><i class="fa-solid fa-calendar-check"></i> Book Consultation</button>
            <button class="btn-ghost"><i class="fa-solid fa-comments"></i> Quick Chat</button>
            <button class="btn-ghost"><i class="fa-regular fa-heart"></i> Save</button>
          </div>
        </div>
      </div>
    </div>

    <div class="details-card">
      <div class="tabs">
        <a href="#" class="dynamic-tab"><i class="fa-solid fa-user"></i> Overview</a>
        <a href="#" class="dynamic-tab-avail"><i class="fa-solid fa-calendar-days"></i> Availability</a>
        <a href="#" class="dynamic-tab-article"><i class="fa-solid fa-newspaper"></i> Articles</a>
        <a href="#" class="active dynamic-tab-reviews"><i class="fa-solid fa-star"></i> Reviews</a>
      </div>
    </div>

    <div class="reviews-container">
      <div class="reviews-header">Patient Reviews</div>
      <div class="rating-summary">
        <strong class="doc-rating-num">4.9</strong>
        <span class="doc-stars-visual" style="color:#f5c518;">★★★★★</span>
        <span class="doc-review-count" style="color:#555;">based on 234 reviews</span>
      </div>

      <div class="doc-reviews-list">
         </div>
    </div>
  </div>
  <script src="doctor.js"></script>
</body>
</html>
